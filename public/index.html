<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
  <meta name="description" content="Web site created using create-react-app" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <link rel="preconnect" href="https://res.cloudinary.com">

  <!-- LCP 이미지 Preload (Speed Index 개선 핵심) -->
  <!-- 데스크탑용 배너 이미지 미리 로드 (1200px 초과 시) -->
  <link rel="preload" as="image"
    href="https://res.cloudinary.com/daqjqq0hy/image/upload/w_1920,f_auto,q_auto/v1705893944/wmzeuycnkxyldfnqllyz.webp"
    media="(min-width: 1201px)">

  <!-- 모바일용 배너 이미지 미리 로드 (Slow 4G·LCP 개선: 480px로 용량 축소) -->
  <link rel="preload" as="image"
    href="https://res.cloudinary.com/daqjqq0hy/image/upload/w_480,f_auto,q_auto/v1705894339/s3apdxiz3mrpz10rnagw.webp"
    media="(max-width: 1200px)">

  <title>블랙업</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <!-- LCP 크리티컬 이미지: JS 실행 전 브라우저가 즉시 발견·다운로드 (Resource load delay 해소) -->
  <picture id="lcp-critical" aria-hidden="true" style="position:absolute;top:0;left:0;width:100%;z-index:-1;margin:0;display:block;pointer-events:none">
    <source media="(max-width: 1200px)" srcset="https://res.cloudinary.com/daqjqq0hy/image/upload/w_480,f_auto,q_auto/v1705894339/s3apdxiz3mrpz10rnagw.webp">
    <img src="https://res.cloudinary.com/daqjqq0hy/image/upload/w_1920,f_auto,q_auto/v1705893944/wmzeuycnkxyldfnqllyz.webp" alt="" fetchpriority="high" width="1920" height="600" style="max-width:100%;height:auto;vertical-align:middle">
  </picture>
  <div id="root"></div>
</body>

</html>
